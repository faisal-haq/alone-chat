<!DOCTYPE html>
<html>
<head><title>AloneChat Fixed</title></head>
<body>

<button onclick="start()">Start Video</button>
<button onclick="next()">Next</button>

<br><br>

<video id="local" autoplay muted playsinline width="200"></video>
<video id="remote" autoplay playsinline width="200"></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let localStream, pc, partnerId;

const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

async function start(){
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("local").srcObject = localStream;
  socket.emit("join",{mode:"video"});
}

socket.on("matched", async (data)=>{
  partnerId = data.partnerId;
  createPC();

  if(Math.random()>0.5){
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("offer",{sdp:offer.sdp,targetId:partnerId});
  }
});

function createPC(){
  pc = new RTCPeerConnection(config);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack = e=>{
    document.getElementById("remote").srcObject = e.streams[0];
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{candidate:e.candidate,targetId:partnerId});
    }
  };
}

socket.on("offer", async data=>{
  if(!pc) createPC();

  await pc.setRemoteDescription({type:"offer",sdp:data.sdp});
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  socket.emit("answer",{sdp:answer.sdp,targetId:data.senderId});
});

socket.on("answer", async data=>{
  await pc.setRemoteDescription({type:"answer",sdp:data.sdp});
});

socket.on("ice-candidate", async data=>{
  if(pc.remoteDescription){
    await pc.addIceCandidate(data.candidate);
  }
});

function next(){
  if(pc) pc.close();
  document.getElementById("remote").srcObject=null;
  socket.emit("next");
}
</script>

</body>
</html>
